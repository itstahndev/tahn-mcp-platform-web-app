version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: mcp-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      - NODE_ENV=development
